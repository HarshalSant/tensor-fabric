name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pynvml fastapi uvicorn httpx structlog tenacity click rich pydantic prometheus-client
          pip install pytest pytest-asyncio
          pip install -e . --no-deps

      - name: Import check (all modules)
        run: |
          python -c "
          import sys
          sys.path.insert(0, 'src')
          modules = [
              'tensor_fabric.common.tensor_descriptor',
              'tensor_fabric.common.gpu_topology',
              'tensor_fabric.control_plane.gpu_state_manager',
              'tensor_fabric.control_plane.routing_engine',
              'tensor_fabric.storage.tensor_fs',
              'tensor_fabric.storage.gpudirect_bridge',
              'tensor_fabric.network.tensor_router',
              'tensor_fabric.inference.kv_cache_manager',
              'tensor_fabric.inference.batch_aggregator',
              'tensor_fabric.inference.nim_client',
              'tensor_fabric.inference.inference_mesh',
          ]
          for m in modules:
              __import__(m)
              print(f'OK: {m}')
          print(f'All {len(modules)} modules imported successfully')
          "

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

      - name: Run benchmark (CPU mode)
        run: |
          python benchmarks/e2e_benchmark.py --iterations 10 --compare-baseline

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check src/ --select E,W,F --ignore E501
