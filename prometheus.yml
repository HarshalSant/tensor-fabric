global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: tensor-fabric-control-plane
    static_configs:
      - targets: ["control-plane:8000"]
    metrics_path: /metrics

  - job_name: tensor-fabric-inference
    static_configs:
      - targets: ["inference-fabric:8002"]
    metrics_path: /metrics

  - job_name: nvidia-dcgm
    static_configs:
      - targets: ["dcgm-exporter:9400"]
